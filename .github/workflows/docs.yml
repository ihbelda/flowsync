name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "backend/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            docs/site/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install docs site dependencies
        working-directory: docs/site
        run: npm ci

      # `npm run build` dispara antes el hook `prebuild`, que arranca el
      # backend real (ver docs/site/scripts/generate-openapi.sh) para
      # generar docs/site/openapi.yaml y alimentar la referencia de la API.
      - name: Build site
        working-directory: docs/site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
